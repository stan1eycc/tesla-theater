<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESLA THEATER</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0c0c;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Landing */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
      text-align: center;
    }
    .landing.hidden { display: none; }

    .landing h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #e82127;
      margin-bottom: 8px;
    }
    .landing p.sub {
      color: #555;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }
    .launch-btn {
      background: #e82127;
      color: #fff;
      border: none;
      padding: 16px 56px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      text-transform: uppercase;
    }
    .launch-btn:hover {
      background: #ff2d32;
      box-shadow: 0 0 30px rgba(232, 33, 39, 0.4);
    }
    .landing .note {
      color: #444;
      font-size: 11px;
      margin-top: 24px;
    }

    /* Dashboard */
    .dashboard { display: none; }
    .dashboard.active { display: block; }

    .header {
      text-align: center;
      padding: 36px 20px 24px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #e82127;
    }
    .header p {
      color: #444;
      font-size: 11px;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      padding: 0 24px;
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .card:hover {
      border-color: #e82127;
      background: #1a1a1a;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(232, 33, 39, 0.15);
    }
    .card img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 10px;
    }
    .card span {
      font-size: 12px;
      font-weight: 500;
      color: #ccc;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      max-width: 860px;
      margin: 28px auto;
    }

    /* Tools bar (bottom, smaller) */
    .tools-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 24px 40px;
      max-width: 860px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .tool-item {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 120px;
      justify-content: center;
    }
    .tool-item:hover {
      border-color: #333;
      background: #1a1a1a;
    }
    .tool-item img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      border-radius: 4px;
    }
    .tool-item span {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
    }

    .footer {
      text-align: center;
      padding: 16px;
      color: #222;
      font-size: 10px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Landing -->
  <div class="landing" id="landing">
    <h1>TESLA THEATER</h1>
    <p class="sub">FULLSCREEN STREAMING PORTAL</p>
    <a class="launch-btn" id="launchBtn" href="#">LAUNCH FULLSCREEN</a>
    <p class="note">⚠️ Fullscreen unavailable when parked with hazard lights on</p>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>TESLA THEATER</h1>
      <p>FULLSCREEN STREAMING PORTAL</p>
    </div>

    <!-- Main: Streaming + Music -->
    <div class="main-grid">
      <a class="card" href="#" data-url="https://www.hbomax.com/">
        <img src="icons/hbomax.png" alt="HBO Max">
        <span>HBO Max</span>
      </a>
      <a class="card" href="#" data-url="https://tv.apple.com/tw/">
        <img src="icons/appletv.webp" alt="Apple TV+">
        <span>Apple TV+</span>
      </a>
      <a class="card" href="#" data-url="https://www.primevideo.com/">
        <img src="icons/primevideo.png" alt="Prime Video">
        <span>Prime Video</span>
      </a>
      <a class="card" href="#" data-url="https://hamivideo.hinet.net/">
        <img src="icons/hamivideo.png" alt="HamiVideo">
        <span>HamiVideo</span>
      </a>
      <a class="card" href="#" data-url="https://www.nba.com/">
        <img src="icons/nba.png" alt="NBA">
        <span>NBA</span>
      </a>
      <a class="card" href="#" data-url="https://www.plex.tv/your-media/">
        <img src="icons/plex.webp" alt="Plex">
        <span>Plex</span>
      </a>
      <a class="card" href="#" data-url="https://listen.tidal.com/">
        <img src="icons/tidal.jpg" alt="TIDAL">
        <span>TIDAL</span>
      </a>
      <a class="card" href="#" data-url="https://play.qobuz.com/">
        <img src="icons/qobuz.png" alt="Qobuz">
        <span>Qobuz</span>
      </a>
    </div>

    <!-- Tools -->
    <hr class="divider">
    <div class="tools-bar">
      <a class="tool-item" href="#" data-url="https://www.plugshare.com/tw">
        <img src="icons/plugshare.svg" alt="PlugShare">
        <span>PlugShare</span>
      </a>
      <a class="tool-item" href="#" data-url="https://abetterrouteplanner.com/">
        <img src="icons/abrp.svg" alt="ABRP">
        <span>ABRP</span>
      </a>
      <a class="tool-item" href="#" data-url="https://supercharge.info/map?Center=23.69,120.94&Zoom=8">
        <img src="icons/supercharge.svg" alt="Supercharge">
        <span>Supercharger</span>
      </a>
      <a class="tool-item" href="#" data-url="https://1968.freeway.gov.tw/">
        <img src="icons/highway.svg" alt="1968">
        <span>Highway 1968</span>
      </a>
      <a class="tool-item" href="#" data-url="https://www.windy.com/?24.097,121.347,8">
        <img src="icons/windy.svg" alt="Windy">
        <span>Windy</span>
      </a>
    </div>

    <div class="footer">TESLA THEATER</div>
  </div>

  <script>
    const YT_REDIRECT = 'https://www.youtube.com/redirect?q=';

    document.getElementById('launchBtn').addEventListener('click', function(e) {
      e.preventDefault();
      const dashUrl = window.location.href.split('#')[0] + '#dashboard';
      window.location.href = YT_REDIRECT + encodeURIComponent(dashUrl);
    });

    function checkMode() {
      if (window.location.hash === '#dashboard') {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('dashboard').classList.add('active');
      }
    }
    checkMode();
    window.addEventListener('hashchange', checkMode);

    document.querySelectorAll('.card, .tool-item').forEach(el => {
      el.addEventListener('click', function(e) {
        e.preventDefault();
        const url = this.dataset.url;
        if (url) window.location.href = YT_REDIRECT + encodeURIComponent(url);
      });
    });
  </script>

</body>
</html>
