<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <rect width="120" height="120" rx="24" fill="#000"/>
  <!-- TIDAL logo - two rows of diamonds -->
  <g transform="translate(60, 50)" fill="#fff">
    <!-- Top row: 3 diamonds -->
    <polygon points="-30,-15 -20,0 -30,15 -40,0"/>
    <polygon points="0,-15 10,0 0,15 -10,0"/>
    <polygon points="30,-15 40,0 30,15 20,0"/>
    <!-- Bottom: 1 diamond -->
    <polygon points="0,15 10,30 0,45 -10,30"/>
  </g>
  <text x="60" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#fff" letter-spacing="2">TIDAL</text>
</svg>
